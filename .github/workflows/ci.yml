name: CI

on:
  push:
    branches: [main]
  pull_request:

# 同じブランチで新しい push が来たら走行中のジョブをキャンセル(古い結果を待たない)。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      # Pin third-party actions by full commit SHA. タグ書き換えによるサプライ
      # チェーン攻撃を避けるため、必ず SHA を使い、隣に検証済みのバージョンを
      # コメントしておく。
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # wasm-ama テストは CI 環境で安定しないため除外。ローカルでは `npm run test` で回す。
      - name: Test
        run: npm run test -- --exclude "**/wasm-ama-ai.test.ts"

      # build は内部で `tsc -b && vite build` を実行するため、型検査も同時に走る。
      - name: Build
        run: npm run build
