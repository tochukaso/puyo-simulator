name: CI

on:
  push:
    branches: [main]
  pull_request:

# 同じブランチで新しい push が来たら走行中のジョブをキャンセル(古い結果を待たない)。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      # Pin third-party actions by full commit SHA. タグ書き換えによるサプライ
      # チェーン攻撃を避けるため、必ず SHA を使い、隣に検証済みのバージョンを
      # コメントしておく。
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # wasm-ama テストは CI 環境で安定しないため除外。ローカルでは `npm run test` で回す。
      - name: Test
        run: npm run test -- --exclude "**/wasm-ama-ai.test.ts"

      # build は内部で `tsc -b && vite build` を実行するため、型検査も同時に走る。
      - name: Build
        run: npm run build

  # ライセンスチェック: npm 依存(production)に GPL/AGPL/LGPL が混入していないか、
  # および Rust 側 (src-tauri) のクレートライセンスを cargo-deny で検査する。
  license-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.node-version'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check npm production licenses (no GPL family)
        run: npx license-checker --production --failOn 'GPL;AGPL;LGPL'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Check Rust crate licenses (cargo deny)
        run: cd src-tauri && cargo deny check licenses
