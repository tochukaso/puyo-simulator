name: Deploy to Cloudflare Workers

# main への push 時に自動デプロイ。手動実行も許可。
on:
  push:
    branches: [main]
  workflow_dispatch:

# 同一ブランチで連続 push されても、安全のためキャンセルせず順次実行する。
# (デプロイ最中の中断はカスタムドメインの剥がれ等を招きうるため。)
concurrency:
  group: cf-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # cancel-in-progress: false なので、ハングした run が後続をブロックしないよう
    # 上限を切っておく(npm ci + build + wrangler deploy で通常 5 分以内)。
    timeout-minutes: 20
    environment: production
    permissions:
      contents: read
    steps:
      # Pin third-party actions by full commit SHA. タグ書き換えによるサプライ
      # チェーン攻撃を避けるため、必ず SHA を使い、隣に検証済みのバージョンを
      # コメントしておく(.github/workflows/ci.yml と同じ方針)。
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and deploy
        env:
          # 機密情報はすべて GitHub Secrets 経由で注入する。
          # repo は public なので wrangler.jsonc にもこれらを書かない。
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CUSTOM_DOMAIN: ${{ secrets.CUSTOM_DOMAIN }}
          # D1 データベース ID。未設定なら scripts/cf-deploy-prepare.mjs が
          # d1 バインドを落として deploy する (API は 500 を返すが deploy は通る)。
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
        run: npm run deploy

      # デプロイ直後に GET /api/scores/<random-id> を叩いて 5xx でないことを
      # 確認する smoke check。期待は 404 (id 未存在)。500 が返ったら D1 バインド
      # 不整合 (binding はあるが DB に届かない等) なので CI を失敗させる。
      # GitHub Actions の `if:` から secrets を直接参照すると不安定なため、
      # シェル側で空チェックして skip する。
      - name: Smoke check /api/scores
        env:
          CUSTOM_DOMAIN: ${{ secrets.CUSTOM_DOMAIN }}
        run: |
          set -e
          if [ -z "$CUSTOM_DOMAIN" ]; then
            echo "[smoke] CUSTOM_DOMAIN not set; skipping"
            exit 0
          fi
          probe_id="ci-smoke-$(date +%s)"
          url="https://${CUSTOM_DOMAIN}/api/scores/${probe_id}"
          # `--max-time 15` で hang を防ぎ、本体は捨てて HTTP ステータスだけ取る。
          status=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 15 "$url" || echo 000)
          echo "[smoke] GET ${url} -> ${status}"
          # 404 (期待) / 200 (万一 ID が当たった) / 4xx 系は OK。5xx と 000 (timeout/接続失敗) は NG。
          if [ "$status" = "000" ] || [ "${status:0:1}" = "5" ]; then
            echo "[smoke] /api/scores returned ${status} — likely D1 misconfiguration"
            exit 1
          fi
