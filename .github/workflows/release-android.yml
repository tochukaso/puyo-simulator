name: release-android

# v* タグ push で署名済み Release APK をビルドし、GitHub Releases に添付する。
# 必要な GitHub Secrets:
#   ANDROID_KEYSTORE_BASE64   - keystore (.jks) を `base64 -i release.jks | pbcopy` した値
#   ANDROID_KEYSTORE_PASSWORD - storePassword
#   ANDROID_KEY_ALIAS         - keyAlias (例: upload)
#   ANDROID_KEY_PASSWORD      - keyPassword
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write  # GitHub Releases にアセットを添付するため

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: 'r28'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'

      - name: Setup Rust toolchain (aarch64-linux-android)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: 'aarch64-linux-android'

      - name: Install dependencies
        run: npm ci

      - name: Verify vendored .a is committed
        run: |
          test -f src-tauri/vendor/ama/aarch64-linux-android/libama_native.a

      - name: Install cargo-about
        run: cargo install cargo-about --features cli --locked

      - name: Collect third-party licenses
        run: npm run licenses:collect

      - name: Restore signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set"
            exit 1
          fi
          KEYSTORE_PATH="$GITHUB_WORKSPACE/src-tauri/gen/android/release.jks"
          echo "$KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"
          cat > "$GITHUB_WORKSPACE/src-tauri/gen/android/key.properties" <<EOF
          storeFile=$KEYSTORE_PATH
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build signed release APK (arm64-v8a)
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: npx tauri android build --apk --target aarch64

      - name: Locate built APK
        id: apk
        run: |
          APK=$(find src-tauri/gen/android/app/build/outputs/apk -name '*release*.apk' | head -1)
          if [ -z "$APK" ]; then
            echo "::error::APK not found"; ls -R src-tauri/gen/android/app/build/outputs/apk; exit 1
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          DEST="gtr-training-${VERSION}-arm64-v8a.apk"
          cp "$APK" "$DEST"
          sha256sum "$DEST" > "${DEST}.sha256"
          echo "apk_path=$DEST" >> "$GITHUB_OUTPUT"
          echo "sha_path=${DEST}.sha256" >> "$GITHUB_OUTPUT"
          ls -l "$DEST"

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.apk.outputs.apk_path }}
            ${{ steps.apk.outputs.sha_path }}
          generate_release_notes: true
          fail_on_unmatched_files: true
